#
# rust-ci.yml — Cargo build, test, clippy, and fmt for Rust projects.
# Cross-platform matrix: Linux, macOS, Windows.
#
# NOTE: do NOT gate these jobs with `if: hashFiles('Cargo.toml') != ''`.
# `hashFiles()` is not valid in a job-level `if:` — GitHub rejects the whole
# workflow at validation time (startup failure: "Unrecognized function:
# 'hashFiles'", zero jobs scheduled), which silently disabled Rust CI here.
# This repo is unconditionally a Cargo workspace, so no guard is needed. (Same
# lesson is recorded in proof-regression.yml, which guards in a post-checkout
# step instead.)
name: Rust CI

on:
  pull_request:
    branches: ['**']
  push:
    branches: [main, master]

permissions:
  contents: read

jobs:
  check:
    name: Check (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@4be9e76fd7c4901c61fb841f559994984270fce7 # stable
        with:
          components: clippy, rustfmt

      - name: Cache cargo registry and build
        uses: Swatinem/rust-cache@779680da715d629ac1d338a641029a2f4372abb5 # v2

      - name: Cargo check
        run: cargo check --all-targets 2>&1

      - name: Cargo fmt
        run: cargo fmt --all -- --check

      - name: Cargo clippy
        run: cargo clippy --all-targets -- -D warnings

  test:
    name: Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    needs: check
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@4be9e76fd7c4901c61fb841f559994984270fce7 # stable

      - name: Cache cargo registry and build
        uses: Swatinem/rust-cache@779680da715d629ac1d338a641029a2f4372abb5 # v2

      - name: Run tests
        run: cargo test --all-targets

      - name: Write summary
        if: always()
        run: |
          echo "## Rust CI Results (${{ matrix.os }})" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "- **cargo check**: passed" >> "$GITHUB_STEP_SUMMARY"
          echo "- **cargo test**: completed" >> "$GITHUB_STEP_SUMMARY"
